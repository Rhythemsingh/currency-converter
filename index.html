<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">       
   <title>Free Currency Converter India | Fast Exchange Rates</title>
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <meta name="description" content="Convert currencies instantly with our free online currency converter. Accurate exchange rates for USD, INR and more.">
</head>
<body>
       <div class="container">

       <b><div id="name">Currency Converter 💱</div></b>
       <br>
       <b><div id="enteramount">Enter Amount</div></b>
<input type="number" placeholder="Enter amount">
<br>
<br>
<div class="dropdown">
    <div class="first">
       <b><p id="from">FROM</p></b>
        <b> <span class="arrow">⇄</span></b>
        <b> <p id="to">TO</p></b>
    </div>
     <div class="second">
        <img src="https://flagsapi.com/IN/flat/64.png">
        <select id="option1">
            <option value="INR" selected>INR</option>
            <option value="USD">USD</option>
        </select>
        <i class="fa-solid fa-arrow-right-arrow-left"></i>
        <select id="option2">
            <option value="INR">INR</option>
            <option value="USD" selected>USD</option>
        </select>
        <img src="https://flagsapi.com/US/flat/64.png">
    </div>
</div>
<br>
<br>
<br>
<button><b>Convert</b></button>
<h2>100 INR = 1.2 USD</h2>
</div>
    <script src="index.js"></script>
    <script src="app.js"></script>
</body>
</html>
